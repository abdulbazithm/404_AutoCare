{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">
    <img src="{% static 'images/car2.jpg' %}" class="d-block w-100" style="height:450px; object-fit:cover;">

<div class="card p-4">

<h3 class="text-center mb-4" id="reg_text">Create Account</h3>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Username</label>
{{ form.username }}
</div>

<div class="mb-3">
<label>Email</label>
{{ form.email }}
</div>

<div class="mb-3">
<label>Phone Number</label>
{{ form.phone }}
</div>

<div class="mb-3">
<label>Password</label>
{{ form.password }}
</div>

<button class="btn btn-primary w-100">Register</button>

</form>

</div>

</div>

</div>

{% endblock %}
