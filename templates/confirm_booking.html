{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Confirm Your Booking</h2>

<div class="card p-4">

<p><strong>Car Model:</strong> {{ data.car_model }}</p>
<p><strong>Car Number:</strong> {{ data.car_number }}</p>
<p><strong>Airport:</strong> {{ data.airport }}</p>
<p><strong>Service:</strong> {{ data.service_type }}</p>
<p><strong>Total Price:</strong> ₹{{ price }}</p>

<form method="POST">
{% csrf_token %}

<div class="form-check mb-3">

<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">
I confirm that the provided vehicle details are correct and authorize 404 AutoCare to service my vehicle.
</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">
I agree to pay any additional charges beyond the estimated amount, including charges for
extended parking, additional repairs, or extra work not included in the initial estimate.
</label>
</div>

<button class="btn btn-primary">
Confirm Booking
</button>

</form>

</div>

{% endblock %}
